<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>國小國文練習系統</title>
<style>
:root {
  --primary: #4A90D9;
  --primary-dark: #3570B0;
  --accent: #FF8C42;
  --success: #4CAF50;
  --danger: #E74C3C;
  --warning: #F39C12;
  --bg: #F0F4F8;
  --card: #FFFFFF;
  --text: #2C3E50;
  --text-light: #7F8C8D;
  --border: #E0E6ED;
  --shadow: 0 2px 8px rgba(0,0,0,0.1);
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: "Microsoft JhengHei","PingFang TC","Noto Sans TC",sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 18px;
  line-height: 1.6;
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
}
#app { max-width: 600px; margin: 0 auto; padding: 0 0 80px 0; }

/* Header */
.header {
  background: linear-gradient(135deg, var(--primary), #6BB5FF);
  color: #fff;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 10px rgba(74,144,217,0.3);
}
.header .back-btn {
  background: rgba(255,255,255,0.2);
  border: none;
  color: #fff;
  font-size: 22px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.header .back-btn:active { background: rgba(255,255,255,0.35); }
.header h1 { font-size: 20px; font-weight: 700; }
.header .header-actions { margin-left: auto; display: flex; gap: 8px; }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 24px;
  border: none;
  border-radius: var(--radius);
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
  white-space: nowrap;
}
.btn:active { transform: scale(0.96); }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:active { background: var(--primary-dark); }
.btn-accent { background: var(--accent); color: #fff; }
.btn-accent:active { background: #E07530; }
.btn-success { background: var(--success); color: #fff; }
.btn-success:active { background: #3D9140; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:active { background: #C0392B; }
.btn-outline {
  background: transparent;
  border: 2px solid var(--primary);
  color: var(--primary);
}
.btn-lg { padding: 16px 32px; font-size: 20px; border-radius: 16px; }
.btn-sm { padding: 8px 16px; font-size: 15px; }
.btn-block { width: 100%; }
.btn-icon {
  width: 48px; height: 48px; padding: 0;
  border-radius: 50%; font-size: 22px;
}
.btn-icon-sm { width: 40px; height: 40px; font-size: 18px; }

/* Cards */
.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px;
  margin: 12px 16px;
}
.card-clickable { cursor: pointer; transition: transform 0.1s; }
.card-clickable:active { transform: scale(0.98); }

/* Lists */
.list-item {
  display: flex;
  align-items: center;
  padding: 16px 20px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  gap: 12px;
  transition: background 0.1s;
}
.list-item:first-child { border-radius: var(--radius) var(--radius) 0 0; }
.list-item:last-child { border-radius: 0 0 var(--radius) var(--radius); border-bottom: none; }
.list-item:only-child { border-radius: var(--radius); }
.list-item:active { background: #EBF2FA; }
.list-item .item-text { flex: 1; }
.list-item .item-text h3 { font-size: 19px; font-weight: 600; }
.list-item .item-text p { font-size: 14px; color: var(--text-light); }
.list-item .arrow { color: var(--text-light); font-size: 20px; }
.list-container { margin: 12px 16px; box-shadow: var(--shadow); border-radius: var(--radius); overflow: hidden; }

/* Form */
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 16px; }
.form-input {
  width: 100%;
  padding: 14px 16px;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  font-size: 18px;
  font-family: inherit;
  transition: border-color 0.2s;
}
.form-input:focus { border-color: var(--primary); outline: none; }

/* Tags / Chips */
.chip {
  display: inline-flex;
  align-items: center;
  padding: 6px 14px;
  background: #EBF2FA;
  border-radius: 20px;
  font-size: 15px;
  gap: 6px;
  margin: 4px;
}
.chip-remove {
  background: none; border: none;
  color: var(--danger); font-size: 16px;
  cursor: pointer; padding: 0 2px;
}

/* Handwriting Canvas */
.canvas-area {
  border: 3px dashed var(--border);
  border-radius: var(--radius);
  background: #FEFEFE;
  touch-action: none;
  position: relative;
}
.canvas-area canvas { display: block; width: 100%; height: 100%; }

/* Score display */
.score-display {
  text-align: center;
  padding: 40px 20px;
}
.score-number {
  font-size: 72px;
  font-weight: 800;
  margin: 16px 0;
}
.score-great { color: var(--success); }
.score-ok { color: var(--warning); }
.score-low { color: var(--danger); }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; padding: 20px;
}
.modal {
  background: var(--card);
  border-radius: 20px;
  padding: 28px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}
.modal h2 { margin-bottom: 16px; font-size: 22px; }
.modal .btn { margin-top: 12px; }

/* Badge */
.badge {
  background: var(--accent);
  color: #fff;
  border-radius: 12px;
  padding: 2px 10px;
  font-size: 14px;
  font-weight: 700;
}

/* Home menu grid */
.home-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 16px;
}
.home-card {
  background: var(--card);
  border-radius: 16px;
  padding: 24px 16px;
  text-align: center;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.1s;
}
.home-card:active { transform: scale(0.96); }
.home-card .icon { font-size: 40px; margin-bottom: 8px; }
.home-card .label { font-size: 17px; font-weight: 600; }
.home-card.wide { grid-column: span 2; }

/* Review card */
.review-card {
  text-align: center;
  padding: 24px;
}
.review-char {
  font-size: 120px;
  font-weight: 700;
  line-height: 1.2;
  margin: 12px 0;
  color: var(--text);
}
.review-zhuyin {
  font-size: 36px;
  color: var(--primary);
  margin-bottom: 12px;
}
.review-stroke-container {
  display: flex;
  justify-content: center;
  margin: 16px 0;
}

/* Test layout */
.test-container {
  padding: 16px;
}
.test-prompt {
  text-align: center;
  margin-bottom: 16px;
}
.test-zhuyin {
  font-size: 48px;
  color: var(--primary);
  font-weight: 700;
}
.test-progress {
  font-size: 15px;
  color: var(--text-light);
  margin-bottom: 8px;
}
.test-canvas-wrapper {
  width: calc(100% - 16px);
  max-width: 100%;
  aspect-ratio: 4 / 3;
  margin: 0 auto 16px;
}
.test-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}
.test-answer {
  font-size: 64px;
  font-weight: 700;
  color: var(--success);
  text-align: center;
  margin: 8px 0;
  min-height: 80px;
}

/* Eval card */
.eval-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px;
  background: var(--card);
  border-radius: var(--radius);
  margin: 8px 16px;
  box-shadow: var(--shadow);
}
.eval-item img {
  width: 100px;
  height: 100px;
  border: 2px solid var(--border);
  border-radius: 8px;
  object-fit: contain;
  background: #fff;
}
.eval-info {
  flex: 1;
  text-align: center;
}
.eval-info .char { font-size: 32px; font-weight: 700; }
.eval-info .zhuyin { font-size: 20px; color: var(--primary); }
.eval-btns { display: flex; flex-direction: column; gap: 8px; }
.eval-marked { font-size: 28px; font-weight: 700; }
.eval-correct { color: var(--success); }
.eval-wrong { color: var(--danger); }

/* Checkbox list */
.check-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}
.check-item:last-child { border-bottom: none; }
.check-box {
  width: 28px; height: 28px;
  border: 2px solid var(--border);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: #fff;
  flex-shrink: 0;
  transition: all 0.15s;
}
.check-item.checked .check-box {
  background: var(--primary);
  border-color: var(--primary);
}
.check-item .check-label { font-size: 18px; flex: 1; }

/* Points bar */
.points-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px;
  font-size: 20px;
  font-weight: 700;
  color: var(--accent);
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-light);
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 16px; }

/* Floating action button */
.fab {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: var(--primary);
  color: #fff;
  border: none;
  font-size: 30px;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(74,144,217,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 50;
}
.fab:active { transform: scale(0.92); }

/* Tab bar for word detail */
.tab-bar {
  display: flex;
  border-bottom: 2px solid var(--border);
  margin: 0 16px;
}
.tab {
  flex: 1;
  padding: 12px;
  text-align: center;
  font-size: 16px;
  font-weight: 600;
  color: var(--text-light);
  background: none;
  border: none;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  font-family: inherit;
}
.tab.active {
  color: var(--primary);
  border-bottom-color: var(--primary);
}

/* Record bar chart */
.record-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 4px 0;
}
.record-bar .bar {
  height: 20px;
  border-radius: 10px;
  min-width: 4px;
}
.bar-correct { background: var(--success); }
.bar-wrong { background: var(--danger); }

/* OCR loading */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.9);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 300;
  gap: 16px;
}
.spinner {
  width: 48px; height: 48px;
  border: 4px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Reward item */
.reward-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 20px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
}
.reward-item:last-child { border-bottom: none; }
.reward-info { flex: 1; }
.reward-info h3 { font-size: 18px; }
.reward-info .cost { color: var(--accent); font-weight: 600; font-size: 15px; }

/* Utility */
.text-center { text-align: center; }
.mt-12 { margin-top: 12px; }
.mt-16 { margin-top: 16px; }
.mb-12 { margin-bottom: 12px; }
.p-16 { padding: 16px; }
.gap-12 { gap: 12px; }
.flex { display: flex; }
.flex-center { display: flex; align-items: center; justify-content: center; }
.flex-col { display: flex; flex-direction: column; }
.flex-wrap { flex-wrap: wrap; }
.hidden { display: none !important; }

/* Animations */
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
.fade-in { animation: fadeIn 0.3s ease-out; }
@keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 70% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
.pop-in { animation: pop 0.4s ease-out; }

/* Image viewer */
.img-viewer {
  width: 100%;
  max-height: 70vh;
  object-fit: contain;
  border-radius: var(--radius);
}

/* Delete word btn */
.word-delete {
  background: none;
  border: none;
  color: var(--danger);
  font-size: 20px;
  cursor: pointer;
  padding: 4px 8px;
  opacity: 0.6;
}
.word-delete:active { opacity: 1; }

/* Responsive */
@media (max-width: 400px) {
  .review-char { font-size: 80px; }
  .test-zhuyin { font-size: 36px; }
  .btn-lg { padding: 14px 24px; font-size: 18px; }
}
</style>

const KEYS = {
  lessons: 'zhcn_lessons',

function load(key, fallback) {
  try { const d = localStorage.getItem(key); return d ? JSON.parse(d) : fallback; }
  catch { return fallback; }
}
function save(key, data) { localStorage.setItem(key, JSON.stringify(data)); }

function getLessons() { return load(KEYS.lessons, []); }
function saveLessons(l) { save(KEYS.lessons, l); }
function getRecords() { return load(KEYS.records, {}); }

function getPoints() { return load(KEYS.points, 0); }
function savePoints(p) { save(KEYS.points, p); }
function getRewards() { return load(KEYS.rewards, []); }
function saveRewards(r) { save(KEYS.rewards, r); }

// ========== TTS ==========
function speak(text, onEnd) {
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-TW';
  u.rate = 0.8;
  if (onEnd) u.onend = onEnd;
  speechSynthesis.speak(u);
}

// ========== PINYIN TO ZHUYIN ==========
function pinyinToZhuyin(pinyinStr) {
  // Split pinyin string into syllables (space-separated or continuous with tone marks)
  const syllables = pinyinStr.trim().toLowerCase().split(/\s+/);
  return syllables.map(s => syllableToZhuyin(s)).join(' ');
}

function syllableToZhuyin(s) {
  if (!s) return '';
  // Extract tone from accent marks
  const accentMap = {
    'ā':['a',1],'á':['a',2],'ǎ':['a',3],'à':['a',4],
    'ō':['o',1],'ó':['o',2],'ǒ':['o',3],'ò':['o',4],
    'ē':['e',1],'é':['e',2],'ě':['e',3],'è':['e',4],
    'ī':['i',1],'í':['i',2],'ǐ':['i',3],'ì':['i',4],
    'ū':['u',1],'ú':['u',2],'ǔ':['u',3],'ù':['u',4],
    'ǖ':['ü',1],'ǘ':['ü',2],'ǚ':['ü',3],'ǜ':['ü',4],
  };
  const toneSymbols = { 1: '', 2: 'ˊ', 3: 'ˇ', 4: 'ˋ', 5: '˙' };
  let tone = 5; // default neutral
  let base = s;
  // Check tone number at end
  if (/[1-5]$/.test(base)) {
    tone = parseInt(base.slice(-1));
    base = base.slice(0, -1);
  } else {
    // Check accent marks
    for (const [mark, [repl, t]] of Object.entries(accentMap)) {
      if (base.includes(mark)) {
        base = base.replace(mark, repl);
        tone = t;
        break;
      }
    }
  }
  base = base.replace(/v/g, 'ü');

  // Whole syllable mappings (y/w initials, standalone vowels, zhi/chi/shi/ri/zi/ci/si)
  const wholeMap = {
    'zhi':'ㄓ','chi':'ㄔ','shi':'ㄕ','ri':'ㄖ',
    'zi':'ㄗ','ci':'ㄘ','si':'ㄙ',
    'yi':'ㄧ','ya':'ㄧㄚ','ye':'ㄧㄝ','yao':'ㄧㄠ','you':'ㄧㄡ',
    'yan':'ㄧㄢ','yin':'ㄧㄣ','yang':'ㄧㄤ','ying':'ㄧㄥ','yong':'ㄩㄥ',
    'yu':'ㄩ','yue':'ㄩㄝ','yuan':'ㄩㄢ','yun':'ㄩㄣ',
    'wu':'ㄨ','wa':'ㄨㄚ','wo':'ㄨㄛ','wai':'ㄨㄞ','wei':'ㄨㄟ',
    'wan':'ㄨㄢ','wen':'ㄨㄣ','wang':'ㄨㄤ','weng':'ㄨㄥ',
    'a':'ㄚ','o':'ㄛ','e':'ㄜ','ai':'ㄞ','ei':'ㄟ',
    'ao':'ㄠ','ou':'ㄡ','an':'ㄢ','en':'ㄣ','ang':'ㄤ','eng':'ㄥ','er':'ㄦ',
  };
  if (wholeMap[base]) return wholeMap[base] + toneSymbols[tone];

  // Parse initial + final
  const initials = ['zh','ch','sh','b','p','m','f','d','t','n','l','g','k','h','j','q','x','r','z','c','s'];
  const initialZhuyin = {
    'b':'ㄅ','p':'ㄆ','m':'ㄇ','f':'ㄈ','d':'ㄉ','t':'ㄊ','n':'ㄋ','l':'ㄌ',
    'g':'ㄍ','k':'ㄎ','h':'ㄏ','j':'ㄐ','q':'ㄑ','x':'ㄒ',
    'zh':'ㄓ','ch':'ㄔ','sh':'ㄕ','r':'ㄖ','z':'ㄗ','c':'ㄘ','s':'ㄙ',
  };
  let ini = '', fin = base;
  for (const i of initials) {
    if (base.startsWith(i)) { ini = i; fin = base.slice(i.length); break; }
  }
  // j/q/x + u → ü in zhuyin
  if (['j','q','x'].includes(ini) && fin.startsWith('u')) {
    fin = 'ü' + fin.slice(1);
  }
  const finalZhuyin = {
    'a':'ㄚ','o':'ㄛ','e':'ㄜ','i':'ㄧ','u':'ㄨ','ü':'ㄩ',
    'ai':'ㄞ','ei':'ㄟ','ao':'ㄠ','ou':'ㄡ',
    'an':'ㄢ','en':'ㄣ','ang':'ㄤ','eng':'ㄥ','ong':'ㄨㄥ','er':'ㄦ',
    'ia':'ㄧㄚ','ie':'ㄧㄝ','iao':'ㄧㄠ','iu':'ㄧㄡ','iou':'ㄧㄡ',
    'ian':'ㄧㄢ','in':'ㄧㄣ','iang':'ㄧㄤ','ing':'ㄧㄥ','iong':'ㄩㄥ',
    'ua':'ㄨㄚ','uo':'ㄨㄛ','uai':'ㄨㄞ','ui':'ㄨㄟ','uei':'ㄨㄟ',
    'uan':'ㄨㄢ','un':'ㄨㄣ','uen':'ㄨㄣ','uang':'ㄨㄤ',
    'üe':'ㄩㄝ','üan':'ㄩㄢ','ün':'ㄩㄣ',
  };
  return (initialZhuyin[ini] || '') + (finalZhuyin[fin] || fin) + toneSymbols[tone];
}

function autoGenerateZhuyin(text) {
  if (!text) return '';
  try {
    const chars = text.split('');
    const zhuyinParts = chars.map(ch => {
      if (!/[\u4e00-\u9fff]/.test(ch)) return ch; // non-Chinese char
      // Layer 1: embedded ZHUYIN_DICT (offline, reliable, 1633 chars)
      if (ZHUYIN_DICT && ZHUYIN_DICT[ch]) return ZHUYIN_DICT[ch];
      // Layer 2: pinyin-pro CDN (online, comprehensive)
      if (window.pinyinPro) {
        try {
          const py = window.pinyinPro.pinyin(ch, { toneType: 'symbol', type: 'array' });
          if (py && py.length > 0) return syllableToZhuyin(py[0]);
        } catch {}
      }
      return ch;
    });
    return zhuyinParts.join(' ').trim();
  } catch { return ''; }
}


function autoGenerateRadical(text) {
  if (!text) return '';
  try {
    const chars = text.split('').filter(ch => /[一-鿿]/.test(ch));
    const radicals = chars.map(ch => RADICAL_DICT[ch] || '').filter(r => r);
    return [...new Set(radicals)].join('、');
  } catch { return ''; }
}

// ========== NAV STATE ==========
let currentView = 'home';
let viewParams = {};
const history_stack = [];

function navigate(view, params = {}) {
  history_stack.push({ view: currentView, params: { ...viewParams } });
  currentView = view;
  viewParams = params;
  render();
  window.scrollTo(0, 0);
}

function goBack() {
  if (history_stack.length > 0) {
    const prev = history_stack.pop();
    currentView = prev.view;
    viewParams = prev.params;
    render();
  } else {
    currentView = 'home';
    viewParams = {};
    render();
  }
}

// ========== RENDER ENGINE ==========
function render() {
  const app = document.getElementById('app');
  switch (currentView) {
    case 'home': app.innerHTML = renderHome(); break;
    case 'addLessonSetup': app.innerHTML = renderAddLessonSetup(); break;
    case 'lessonDetail': app.innerHTML = renderLessonDetail(); break;
    case 'addWord': app.innerHTML = renderAddWord(); break;
    case 'editLesson': app.innerHTML = renderEditLesson(); break;
    case 'ocrImport': app.innerHTML = renderOcrImport(); break;
    case 'originalText': app.innerHTML = renderOriginalText(); break;
    case 'reviewSetup': app.innerHTML = renderReviewSetup(); break;
    case 'review': app.innerHTML = renderReview(); autoPlayReview(); break;
    case 'testSetup': app.innerHTML = renderTestSetup(); break;
    case 'test': renderTest(app); return;
    case 'evaluate': app.innerHTML = renderEvaluate(); break;
    case 'result': app.innerHTML = renderResult(); break;
    case 'records': app.innerHTML = renderRecords(); break;
    case 'recordDetail': app.innerHTML = renderRecordDetail(); break;
    case 'rewards': app.innerHTML = renderRewards(); break;
    case 'addReward': app.innerHTML = renderAddReward(); break;
    case 'settings': app.innerHTML = renderSettings(); break;
    default: app.innerHTML = renderHome();
  }
  bindEvents();
}

function bindEvents() {
  // Bind delegated events after render
  document.querySelectorAll('[data-action]').forEach(el => {
    const action = el.dataset.action;
    const handler = handlers[action];
    if (handler) {
      el.onclick = (e) => handler(e, el);
    }
  });
  // Auto-generate zhuyin when typing characters (supports multi-line)
  const wordInput = document.getElementById('wordText');
  if (wordInput) {
    wordInput.addEventListener('input', () => {
      const raw = wordInput.value;
      if (!raw.trim()) return;
      const lines = raw.split('\n');
      const zhuyinLines = lines.map(line => {
        const t = line.trim();
        return t ? autoGenerateZhuyin(t) : '';
      });
      document.getElementById('wordZhuyin').value = zhuyinLines.join('\n');
    });
  }
}

// Auto-play pronunciation + stroke order when entering review mode
function autoPlayReview() {
  const words = viewParams.reviewWords || [];
  const idx = viewParams.reviewIndex || 0;
  if (words.length === 0) return;
  const word = words[idx];
  // Small delay to ensure DOM is ready
  setTimeout(() => {
    // Auto-play pronunciation
    if (viewParams.reviewType === 'english') {
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(word.text);
      u.lang = 'en-US'; u.rate = 0.8;
      speechSynthesis.speak(u);
      return;
    }
    speak(word.text);
    // Auto-play stroke order animation
    const target = document.getElementById('strokeTarget');
    if (!target) return;
    target.innerHTML = '';
    const chars = word.text.split('');
    const divs = chars.map(ch => {
      const div = document.createElement('div');
      div.style.display = 'inline-block';
      div.style.margin = '4px';
      target.appendChild(div);
      return { div, ch };
    });
    async function animateSequentially() {
      for (const { div, ch } of divs) {
        if (!/[\u4e00-\u9fff]/.test(ch)) {
          div.innerHTML = `<span style="font-size:60px">${ch}</span>`;
          continue;
        }
        try {
          const writer = HanziWriter.create(div, ch, {
            width: 120, height: 120,
            padding: 5,
            showOutline: true,
            strokeAnimationSpeed: 1,
            delayBetweenStrokes: 300,
          });
          await new Promise(resolve => {
            writer.animateCharacter({ onComplete: resolve });
          });
        } catch (err) {
          div.innerHTML = `<span style="font-size:60px">${ch}</span>`;
        }
      }
    }
    animateSequentially();
  }, 300);
}

          <div class="zhuyin">${(viewParams.testType === 'english' && w.meaning) ? w.meaning : (w.zhuyin || '')}</div>

// --- RESULT ---
function renderResult() {
  const correct = viewParams.correctCount || 0;
  const total = viewParams.totalCount || 1;
  const score = Math.round((correct / total) * 100);
  let feedback, cssClass, emoji;
  if (score >= 90) { feedback = '你好棒！'; cssClass = 'score-great'; emoji = '🌟'; }
  else if (score >= 60) { feedback = '請加油！'; cssClass = 'score-ok'; emoji = '💪'; }
  else { feedback = '請再考一次'; cssClass = 'score-low'; emoji = '📖'; }

  return `
    ${headerHTML('考試成績')}
    <div class="score-display fade-in">
      <div style="font-size:64px;" class="pop-in">${emoji}</div>
      <div class="score-number ${cssClass} pop-in">${score}</div>
      <div style="font-size:24px;font-weight:700;margin-bottom:8px;">${feedback}</div>
      <div style="color:var(--text-light);">答對 ${correct} 題 / 共 ${total} 題</div>
      ${score === 100 ? '<div class="badge mt-12 pop-in" style="font-size:18px;padding:8px 20px;">🎉 獲得 1 點獎勵點數！</div>' : ''}
    </div>
    <div class="p-16 flex flex-col gap-12">
      <button class="btn btn-primary btn-block" data-action="goHome">回首頁</button>
      <button class="btn btn-outline btn-block" data-action="retakeTest">再考一次</button>
    </div>
  `;
}

// --- RECORDS ---
function renderRecords() {
  const records = getRecords();
  const entries = Object.entries(records);
  if (entries.length === 0) return headerHTML('學習紀錄') + '<div class="empty-state fade-in"><div class="icon">📊</div><p>尚無學習紀錄</p></div>';

  entries.sort((a, b) => (b[1].wrong || 0) - (a[1].wrong || 0));

  return `
    ${headerHTML('學習紀錄')}
    <div class="list-container fade-in">
      ${entries.map(([text, rec]) => {
        const total = (rec.correct || 0) + (rec.wrong || 0);
        const correctPct = total > 0 ? ((rec.correct || 0) / total * 100) : 0;
        const wrongPct = total > 0 ? ((rec.wrong || 0) / total * 100) : 0;
        return `
          <div class="list-item" data-action="openRecordDetail" data-text="${text}">
            <div style="font-size:28px;font-weight:700;width:50px;text-align:center;">${text}</div>
            <div class="item-text">
              <div class="record-bar">
                <span style="font-size:13px;color:var(--success);width:40px;">✓ ${rec.correct || 0}</span>
                <div class="bar bar-correct" style="width:${Math.max(correctPct, 2)}%;"></div>
              </div>
              <div class="record-bar">
                <span style="font-size:13px;color:var(--danger);width:40px;">✗ ${rec.wrong || 0}</span>
                <div class="bar bar-wrong" style="width:${Math.max(wrongPct, 2)}%;"></div>
              </div>
            </div>
            <span class="arrow">›</span>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

// ========== CANVAS ==========
let canvasDrawing = false;
let canvasCtx = null;
let lastPos = null;

function initCanvas() {
  const canvas = document.getElementById('testCanvas');
  if (!canvas) return;
  const wrapper = canvas.parentElement;
  const w = wrapper.clientWidth;
  const h = Math.min(350, w);
  canvas.width = w;
  canvas.height = h;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  canvasCtx = canvas.getContext('2d');
  canvasCtx.lineCap = 'round';
  canvasCtx.lineJoin = 'round';
  canvasCtx.lineWidth = 5;
  canvasCtx.strokeStyle = '#2C3E50';

  // Draw guide lines
  drawGuideLines(canvasCtx, w, h);

  canvas.addEventListener('mousedown', onCanvasStart);
  canvas.addEventListener('mousemove', onCanvasMove);
  canvas.addEventListener('mouseup', onCanvasEnd);
  canvas.addEventListener('mouseleave', onCanvasEnd);
  canvas.addEventListener('touchstart', onCanvasTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onCanvasTouchMove, { passive: false });
  canvas.addEventListener('touchend', onCanvasEnd);
}

function drawGuideLines(ctx, size) {
  ctx.save();
  ctx.strokeStyle = '#E0E6ED';
  ctx.lineWidth = 1;
  ctx.setLineDash([8, 4]);
  ctx.beginPath();
  ctx.moveTo(size / 2, 0); ctx.lineTo(size / 2, size);
  ctx.moveTo(0, size / 2); ctx.lineTo(size, size / 2);
  ctx.stroke();
  ctx.restore();
  ctx.lineWidth = 5;
  ctx.strokeStyle = '#2C3E50';
}

function getCanvasPos(e, canvas) {
  const rect = canvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function onCanvasStart(e) {
  canvasDrawing = true;
  lastPos = getCanvasPos(e, e.target);
}
function onCanvasMove(e) {
  if (!canvasDrawing || !canvasCtx) return;
  const pos = getCanvasPos(e, e.target);
  canvasCtx.beginPath();
  canvasCtx.moveTo(lastPos.x, lastPos.y);
  canvasCtx.lineTo(pos.x, pos.y);
  canvasCtx.stroke();
  lastPos = pos;
}
function onCanvasEnd() { canvasDrawing = false; lastPos = null; }
function onCanvasTouchStart(e) {
  e.preventDefault();
  const touch = e.touches[0];
  canvasDrawing = true;
  lastPos = getCanvasPos(touch, e.target);
}
function onCanvasTouchMove(e) {
  e.preventDefault();
  if (!canvasDrawing || !canvasCtx) return;
  const touch = e.touches[0];
  const pos = getCanvasPos(touch, e.target);
  canvasCtx.beginPath();
  canvasCtx.moveTo(lastPos.x, lastPos.y);
  canvasCtx.lineTo(pos.x, pos.y);
  canvasCtx.stroke();
  lastPos = pos;
}

function getCanvasImage() {
  const canvas = document.getElementById('testCanvas');
  return canvas ? canvas.toDataURL('image/png') : '';
}

function clearCanvasArea() {
  const canvas = document.getElementById('testCanvas');
  if (!canvas || !canvasCtx) return;
  canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
  drawGuideLines(canvasCtx, canvas.width, canvas.height);
}

// ========== HANDLERS ==========
const handlers = {
  goBack: () => goBack(),
  goHome: () => { history_stack.length = 0; currentView = 'home'; viewParams = {}; render(); },

  // Lessons
  goLessons: () => navigate('home'),
  addLesson: () => {
    navigate('addLessonSetup');
  },
  confirmAddLesson: (e, el) => {
    const type = el.dataset.type; // 'chinese' or 'english'
    const lessons = getLessons();
    const id = Date.now().toString();
    const count = lessons.filter(l => (l.type || 'chinese') === type).length + 1;
    const name = type === 'english' ? 'English L' + count : '第' + (lessons.length + 1) + '課';
    lessons.push({ id, name, type, words: [], originalImage: null });
    saveLessons(lessons);
    navigate('lessonDetail', { lessonId: id });
  },
  openLesson: (e, el) => {
    navigate('lessonDetail', { lessonId: el.dataset.id });
  },
  editLessonName: () => {
    navigate('editLesson', { lessonId: viewParams.lessonId });
  },
  saveLessonName: () => {
    const input = document.getElementById('lessonNameInput');
    if (!input || !input.value.trim()) return;
    const lessons = getLessons();
    const lesson = lessons.find(l => l.id === viewParams.lessonId);
    if (lesson) {
      lesson.name = input.value.trim();
      saveLessons(lessons);
    }
    goBack();
  },
  deleteLesson: (e, el) => {
    if (!confirm('確定要刪除此課程嗎？')) return;
    e.stopPropagation();
    const lessons = getLessons().filter(l => l.id !== el.dataset.id);
    saveLessons(lessons);
    history_stack.length = 0;
    currentView = 'home';
    viewParams = {};
    render();
  },

  // Words
  goAddWord: () => navigate('addWord', { lessonId: viewParams.lessonId }),
  saveWord: () => {
    const rawText = document.getElementById('wordText').value.trim();
    if (!rawText) { alert('請輸入字或詞'); return; }
    const lessons = getLessons();
    const lesson = lessons.find(l => l.id === viewParams.lessonId);
    if (!lesson) return;
    const isEnglish = lesson.type === 'english';
    const textLines = rawText.split('\n').map(l => l.trim()).filter(l => l);
    if (isEnglish) {
      const rawMeaning = (document.getElementById('wordMeaning') || {}).value || '';
      const meaningLines = rawMeaning.split('\n').map(l => l.trim());
      textLines.forEach((t, i) => {
        lesson.words.push({ id: (Date.now() + i).toString(), text: t, meaning: meaningLines[i] || '', zhuyin: '', radical: '' });
      });
    } else {
      const rawZhuyin = (document.getElementById('wordZhuyin') || {}).value || '';
      const zhuyinLines = rawZhuyin.split('\n').map(l => l.trim());
      textLines.forEach((t, i) => {
        lesson.words.push({ id: (Date.now() + i).toString(), text: t, zhuyin: zhuyinLines[i] || autoGenerateZhuyin(t), radical: autoGenerateRadical(t) });
      });
    }
    saveLessons(lessons);
    goBack();
  },
  saveAndContinue: () => {
    const rawText = document.getElementById('wordText').value.trim();
    if (!rawText) { alert('請輸入字或詞'); return; }
    const lessons = getLessons();
    const lesson = lessons.find(l => l.id === viewParams.lessonId);
    if (!lesson) return;
    const isEnglish = lesson.type === 'english';
    const textLines = rawText.split('\n').map(l => l.trim()).filter(l => l);
    if (isEnglish) {
      const rawMeaning = (document.getElementById('wordMeaning') || {}).value || '';
      const meaningLines = rawMeaning.split('\n').map(l => l.trim());
      textLines.forEach((t, i) => {
        lesson.words.push({ id: (Date.now() + i).toString(), text: t, meaning: meaningLines[i] || '', zhuyin: '', radical: '' });
      });
    } else {
      const rawZhuyin = (document.getElementById('wordZhuyin') || {}).value || '';
      const zhuyinLines = rawZhuyin.split('\n').map(l => l.trim());
      textLines.forEach((t, i) => {
        lesson.words.push({ id: (Date.now() + i).toString(), text: t, zhuyin: zhuyinLines[i] || autoGenerateZhuyin(t), radical: autoGenerateRadical(t) });
      });
    }
    saveLessons(lessons);
    document.getElementById('wordText').value = '';
    if (isEnglish && document.getElementById('wordMeaning')) document.getElementById('wordMeaning').value = '';
    if (!isEnglish && document.getElementById('wordZhuyin')) document.getElementById('wordZhuyin').value = '';
    document.getElementById('wordText').focus();
  },
  translateEnglish: () => {
    const rawText = document.getElementById('wordText').value.trim();
    if (!rawText) { alert('請先輸入英文單字'); return; }
    const words = rawText.split('\n').map(l => l.trim()).filter(l => l);
    const btn = document.querySelector('[data-action="translateEnglish"]');
    if (btn) { btn.disabled = true; btn.textContent = '🔄 翻譯中...'; }
    const meaningEl = document.getElementById('wordMeaning');
    // Translate each word using MyMemory free API
    Promise.all(words.map(word =>
      fetch('https://api.mymemory.translated.net/get?q=' + encodeURIComponent(word) + '&langpair=en|zh-TW')
        .then(r => r.json())
        .then(data => data.responseData && data.responseData.translatedText ? data.responseData.translatedText : word)
        .catch(() => word)
    )).then(translations => {
      if (meaningEl) meaningEl.value = translations.join('\n');
    }).finally(() => {
      if (btn) { btn.disabled = false; btn.textContent = '🔄 自動翻譯中文'; }
    });
  },
  deleteWord: (e, el) => {
    e.stopPropagation();
    if (!confirm('確定要刪除嗎？')) return;
    const lessons = getLessons();
    const lesson = lessons.find(l => l.id === el.dataset.lesson);
    if (lesson) {
      lesson.words = lesson.words.filter(w => w.id !== el.dataset.id);
      saveLessons(lessons);
    }
    render();
  },
  previewWord: (e, el) => {
    speak(el.dataset.text);
  },

  // Original text
  uploadOriginalText: () => {
    const input = document.getElementById('originalTextInput');
    if (input) {
      input.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          const lessons = getLessons();
          const lesson = lessons.find(l => l.id === viewParams.lessonId);
          if (lesson) {
            lesson.originalImage = ev.target.result;
            saveLessons(lessons);
            render();
          }
        };
        reader.readAsDataURL(file);
      };
      input.click();
    }
  },
  viewOriginalText: () => {
    navigate('originalText', { lessonId: viewParams.lessonId });
  },

  // OCR
  goOcr: () => navigate('ocrImport', { lessonId: viewParams.lessonId }),

  // Review
  goReviewSetup: () => navigate('reviewSetup', { selectedLessons: [], reviewFilter: 'all' }),
  toggleLessonCheck: (e, el) => {
    const id = el.dataset.id;
    let sel = viewParams.selectedLessons || [];
    if (sel.includes(id)) { sel = sel.filter(x => x !== id); }
    else { sel.push(id); }
    viewParams.selectedLessons = sel;
    render();
  },
  setReviewTypeFilter: (e, el) => {
    viewParams.reviewTypeFilter = el.dataset.type;
    viewParams.selectedLessons = [];
    render();
  },
  setReviewFilter: (e, el) => {
    viewParams.reviewFilter = el.dataset.filter;
    render();
  },
  startReview: () => {
    const sel = viewParams.selectedLessons || [];
    if (sel.length === 0) { alert('請選擇至少一個課程'); return; }
    const lessons = getLessons();
    let words = [];
    sel.forEach(id => {
      const l = lessons.find(x => x.id === id);
      if (l) words.push(...l.words);
    });
    if (viewParams.reviewFilter === 'wrong') {
      const records = getRecords();
      words = words.filter(w => records[w.text] && (records[w.text].wrong || 0) > 0);
    }
    if (words.length === 0) { alert('沒有符合條件的字詞'); return; }
    // Shuffle
    for (let i = words.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [words[i], words[j]] = [words[j], words[i]];
    }
    // Detect type from first selected lesson
    const firstLesson = lessons.find(x => x.id === sel[0]);
    const reviewType = firstLesson && firstLesson.type === 'english' ? 'english' : 'chinese';
    navigate('review', { reviewWords: words, reviewIndex: 0, reviewType });
  },
  reviewPrev: () => {
    if ((viewParams.reviewIndex || 0) > 0) {
      viewParams.reviewIndex--;
      render();
    }
  },
  reviewNext: () => {
    const words = viewParams.reviewWords || [];
    const idx = viewParams.reviewIndex || 0;
    if (idx < words.length - 1) {
      viewParams.reviewIndex++;
      render();
    } else {
      goBack();
    }
  },
  speakWord: (e, el) => { speak(el.dataset.text); },
  speakEnglish: (e, el) => {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(el.dataset.text);
    u.lang = 'en-US';
    u.rate = 0.8;
    speechSynthesis.speak(u);
  },
  showStroke: (e, el) => {
    const target = document.getElementById('strokeTarget');
    if (!target) return;
    target.innerHTML = '';
    const chars = el.dataset.text.split('');
    // Create all containers first
    const divs = chars.map(ch => {
      const div = document.createElement('div');
      div.style.display = 'inline-block';
      div.style.margin = '4px';
      target.appendChild(div);
      return { div, ch };
    });
    // Animate sequentially: wait for each character to finish before starting next
    async function animateSequentially() {
      for (const { div, ch } of divs) {
        try {
          const writer = HanziWriter.create(div, ch, {
            width: 120, height: 120,
            padding: 5,
            showOutline: true,
            strokeAnimationSpeed: 1,
            delayBetweenStrokes: 300,
          });
          await new Promise(resolve => {
            writer.animateCharacter({ onComplete: resolve });
          });
        } catch (err) {
          div.innerHTML = `<span style="font-size:60px">${ch}</span>`;
        }
      }
    }
    animateSequentially();
  },

  // Test
  goTestSetup: () => navigate('testSetup', { selectedLessons: [] }),
  toggleTestLessonCheck: (e, el) => {
    const id = el.dataset.id;
    let sel = viewParams.selectedLessons || [];
    if (sel.includes(id)) { sel = sel.filter(x => x !== id); }
    else { sel.push(id); }
    viewParams.selectedLessons = sel;
    render();
  },
  setTestTypeFilter: (e, el) => {
    viewParams.testTypeFilter = el.dataset.type;
    viewParams.selectedLessons = [];
    render();
  },
  startTest: () => {
    const sel = viewParams.selectedLessons || [];
    if (sel.length === 0) { alert('請選擇至少一個課程'); return; }
    const lessons = getLessons();
    let words = [];
    sel.forEach(id => {
      const l = lessons.find(x => x.id === id);
      if (l) words.push(...l.words);
    });
    if (words.length === 0) { alert('所選課程沒有字詞'); return; }
    for (let i = words.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [words[i], words[j]] = [words[j], words[i]];
    }
    // Detect test type from first selected lesson
    const firstLesson = lessons.find(x => x.id === sel[0]);
    const testType = firstLesson && firstLesson.type === 'english' ? 'english' : 'chinese';
    navigate('test', {
      testWords: words,
      testIndex: 0,
      canvasImages: [],
      showAnswer: false,
      selectedLessons: sel,
      testType: testType,
    });
  },
  toggleAnswer: () => {
    viewParams.showAnswer = !viewParams.showAnswer;
    render();
  },
  clearCanvas: () => { clearCanvasArea(); },
  testNext: () => {
    const words = viewParams.testWords || [];
    const idx = viewParams.testIndex || 0;
    // Save canvas image
    if (!viewParams.canvasImages) viewParams.canvasImages = [];
    viewParams.canvasImages[idx] = getCanvasImage();
    viewParams.showAnswer = false;

    if (idx < words.length - 1) {
      viewParams.testIndex++;
      render();
    } else {
      // Last question - speak and go to evaluate
      speak('辛苦了，你很棒，完成這一課，請爸爸媽媽來評分', () => {
        navigate('evaluate', {
          testWords: words,
          canvasImages: viewParams.canvasImages,
          grades: {},
          selectedLessons: viewParams.selectedLessons,
          testType: viewParams.testType,
        });
      });
      // Also navigate after a timeout in case TTS doesn't fire onend
      setTimeout(() => {
        if (currentView === 'test') {
          navigate('evaluate', {
            testWords: words,
            canvasImages: viewParams.canvasImages,
            grades: {},
            selectedLessons: viewParams.selectedLessons,
            testType: viewParams.testType,
          });
        }
      }, 5000);
    }
  },

  // Evaluate
  gradeCorrect: (e, el) => {
    const idx = parseInt(el.dataset.idx);
    viewParams.grades[idx] = true;
    render();
  },
  gradeWrong: (e, el) => {
    const idx = parseInt(el.dataset.idx);
    viewParams.grades[idx] = false;
    render();
  },
  showResult: () => {
    const words = viewParams.testWords || [];
    const grades = viewParams.grades || {};
    let correct = 0;
    const records = getRecords();
    const now = new Date().toISOString();

    words.forEach((w, i) => {
      const isCorrect = grades[i] === true;
      if (isCorrect) correct++;
      // Update records
      if (!records[w.text]) records[w.text] = { correct: 0, wrong: 0, history: [] };
      if (isCorrect) records[w.text].correct++;
      else records[w.text].wrong++;
      records[w.text].history.push({ date: now, result: isCorrect ? 'correct' : 'wrong' });
    });
    saveRecords(records);

    const score = Math.round((correct / words.length) * 100);
    if (score === 100) {
      const pts = getPoints();
      savePoints(pts + 1);
    }

    // Feedback voice
    if (score >= 90) speak('你好棒！');
    else if (score >= 60) speak('請加油！');
    else speak('請再考一次');

    navigate('result', {
      correctCount: correct,
      totalCount: words.length,
      selectedLessons: viewParams.selectedLessons,
    });
  },
  retakeTest: () => {
    const sel = viewParams.selectedLessons || [];
    // Go back to test setup with selections
    history_stack.length = 0;
    currentView = 'testSetup';
    viewParams = { selectedLessons: sel };
    render();
  },

  // Records
  goRecords: () => navigate('records'),
  openRecordDetail: (e, el) => {
    navigate('recordDetail', { wordText: el.dataset.text });
  },

  // Rewards
  goRewards: () => navigate('rewards'),
  goAddReward: () => navigate('addReward'),
  saveReward: () => {
    const name = document.getElementById('rewardName').value.trim();
    const cost = parseInt(document.getElementById('rewardCost').value) || 1;
    if (!name) { alert('請輸入獎勵名稱'); return; }
    const rewards = getRewards();
    rewards.push({ id: Date.now().toString(), name, cost });
    saveRewards(rewards);
    goBack();
  },
  redeemReward: (e, el) => {
    const rewards = getRewards();
    const reward = rewards.find(r => r.id === el.dataset.id);
    if (!reward) return;
    const points = getPoints();
    if (points < reward.cost) { alert('點數不足'); return; }
    if (!confirm(`確定要用 ${reward.cost} 點兌換「${reward.name}」嗎？`)) return;
    savePoints(points - reward.cost);
    speak('恭喜兌換成功！');
    render();
  },
  deleteReward: (e, el) => {
    e.stopPropagation();
    if (!confirm('確定要刪除此獎勵嗎？')) return;
    const rewards = getRewards().filter(r => r.id !== el.dataset.id);
    saveRewards(rewards);
    render();
  },

  // Settings
  goSettings: () => navigate('settings'),
  systemReset: () => {
    const pwd = prompt('請輸入管理密碼：');
    const savedPwd = localStorage.getItem('zhcn_admin_pwd') || '1234';
    if (pwd !== savedPwd) { alert('密碼錯誤'); return; }
    if (!confirm('⚠️ 確定要重置所有資料嗎？\n此操作無法復原！\n（建議先匯出備份）')) return;
    if (!confirm('再次確認：所有課程、學習紀錄、點數將被清除！')) return;
    Object.values(KEYS).forEach(k => localStorage.removeItem(k));
    alert('所有資料已重置');
    history_stack.length = 0;
    currentView = 'home';
    viewParams = {};
    render();
  },
  exportBackup: () => {
    const pwd = prompt('請輸入管理密碼：');
    const savedPwd = localStorage.getItem('zhcn_admin_pwd') || '1234';
    if (pwd !== savedPwd) { alert('密碼錯誤'); return; }
    const backup = {
      version: 1,
      date: new Date().toISOString(),
      lessons: getLessons(),
      records: getRecords(),
      points: getPoints(),
      rewards: getRewards(),
    };
    const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `國字練習備份_${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    alert('備份已下載');
  },
  // Shared: apply backup data (supports both full backup and lessons-only format)
  _applyBackup: (backup, sourceName) => {
    // Support two formats:
    // 1. Full backup: { lessons, records, points, rewards, date }
    // 2. Lessons-only: { lessons } or [ {id, name, words} ]
    let lessons, records, points, rewards, date;
    if (Array.isArray(backup)) {
      // Array of lessons directly
      lessons = backup;
      records = {};
      points = null;
      rewards = null;
      date = null;
    } else if (backup.lessons) {
      lessons = backup.lessons;
      records = backup.records || {};
      points = backup.points;
      rewards = backup.rewards;
      date = backup.date;
    } else {
      alert('檔案格式不正確，找不到課程資料'); return false;
    }
    // Validate lessons structure
    if (!Array.isArray(lessons) || lessons.length === 0) {
      alert('檔案中沒有課程資料'); return false;
    }
    const info = date ? `\n備份日期：${date}` : '';
    const mode = confirm(`匯入方式：\n\n按「確定」→ 合併（保留現有資料，加入新課程）\n按「取消」→ 覆蓋（清除現有資料，僅保留匯入內容）\n\n來源：${sourceName}${info}\n新課程數：${lessons.length}`)
      ? 'merge' : 'overwrite';
    if (mode === 'overwrite') {
      if (!confirm('⚠️ 確定要覆蓋所有現有資料嗎？此操作無法復原！')) return false;
      saveLessons(lessons);
      saveRecords(records);
      if (points != null) savePoints(points);
      if (rewards != null) saveRewards(rewards);
    } else {
      // Merge: append new lessons, keep existing records/points/rewards
      const existing = getLessons();
      const existingIds = new Set(existing.map(l => l.id));
      let addCount = 0;
      lessons.forEach(l => {
        if (existingIds.has(l.id)) {
          // Generate new id to avoid conflict
          l.id = Date.now().toString() + Math.random().toString(36).slice(2, 6);
        }
        existing.push(l);
        addCount++;
      });
      saveLessons(existing);
      // Merge records if present
      if (records && Object.keys(records).length > 0) {
        const existingRecords = getRecords();
        Object.keys(records).forEach(k => {
          if (!existingRecords[k]) existingRecords[k] = records[k];
        });
        saveRecords(existingRecords);
      }
    }
    alert(`匯入成功！（${mode === 'merge' ? '合併模式' : '覆蓋模式'}）`);
    history_stack.length = 0;
    currentView = 'home';
    viewParams = {};
    render();
    return true;
  },
  importBackup: () => {
    const input = document.getElementById('importFileInput');
    if (!input) return;
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const backup = JSON.parse(ev.target.result);
          handlers._applyBackup(backup, '本機檔案：' + file.name);
        } catch (err) {
          alert('匯入失敗：檔案格式錯誤');
        }
      };
      reader.readAsText(file);
      input.value = '';
    };
    input.click();
  },
  importFromUrl: () => {
    const urlInput = document.getElementById('importUrlInput');
    const url = urlInput ? urlInput.value.trim() : '';
    if (!url) { alert('請輸入 JSON 檔案網址'); return; }
    if (!url.startsWith('http://') && !url.startsWith('https://')) {
      alert('請輸入有效的網址（以 http:// 或 https:// 開頭）'); return;
    }
    const btn = document.querySelector('[data-action="importFromUrl"]');
    if (btn) { btn.disabled = true; btn.textContent = '載入中...'; }
    fetch(url)
      .then(res => {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      })
      .then(data => {
        handlers._applyBackup(data, '網址：' + url.slice(0, 50) + (url.length > 50 ? '...' : ''));
      })
      .catch(err => {
        alert('匯入失敗：無法載入網址內容\n' + err.message);
      })
      .finally(() => {
        if (btn) { btn.disabled = false; btn.textContent = '🔗 匯入'; }
      });
  },
  importExample: () => {
    const exampleUrl = 'https://raw.githubusercontent.com/wilson88088/KidLearnChineseWord/refs/heads/main/%E4%B8%89%E5%B9%B4%E7%B4%9A_L1ToL3.json';
    const btn = document.querySelector('[data-action="importExample"]');
    if (btn) { btn.disabled = true; btn.textContent = '📚 載入範例中...'; }
    fetch(exampleUrl)
      .then(res => {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      })
      .then(data => {
        handlers._applyBackup(data, '範例：三年級 L1~L3');
      })
      .catch(err => {
        alert('匯入範例失敗：\n' + err.message + '\n\n請確認網路連線正常。');
      })
      .finally(() => {
        if (btn) { btn.disabled = false; btn.textContent = '📚 匯入範例（三年級 L1~L3）'; }
      });
  },
  changePassword: () => {
    const oldPwd = document.getElementById('oldPassword').value;
    const newPwd = document.getElementById('newPassword').value;
    const savedPwd = localStorage.getItem('zhcn_admin_pwd') || '1234';
    if (oldPwd !== savedPwd) { alert('目前密碼錯誤'); return; }
    if (!newPwd || newPwd.length < 4) { alert('新密碼至少需要 4 個字元'); return; }
    localStorage.setItem('zhcn_admin_pwd', newPwd);
    alert('密碼已更新！');
    document.getElementById('oldPassword').value = '';
    document.getElementById('newPassword').value = '';
  },
};

// ========== OCR ==========
function initOCR() {
  // Listen for file input on OCR page
  document.addEventListener('change', async (e) => {
    if (e.target.id !== 'ocrFileInput') return;
    const file = e.target.files[0];
    if (!file) return;

    const preview = document.getElementById('ocrPreview');
    const result = document.getElementById('ocrResult');
    if (preview) {
      const url = URL.createObjectURL(file);
      preview.innerHTML = `<img src="${url}" style="max-width:100%;border-radius:8px;" />`;
    }

    // Show loading
    const loadingDiv = document.createElement('div');
    loadingDiv.className = 'loading-overlay';
    loadingDiv.innerHTML = '<div class="spinner"></div><p style="font-size:18px;">正在辨識文字...</p>';
    document.body.appendChild(loadingDiv);

    try {
      if (typeof Tesseract === 'undefined') {
        // Load Tesseract dynamically
        await loadScript('https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js');
      }
      const worker = await Tesseract.createWorker('chi_tra');
      const { data } = await worker.recognize(file);
      await worker.terminate();

      const text = data.text.trim();
      loadingDiv.remove();

      if (result) {
        if (!text) {
          result.innerHTML = '<p style="color:var(--danger);">未偵測到文字，請嘗試其他圖片。</p>';
          return;
        }
        // Extract characters (filter out non-Chinese)
        const chars = [...new Set(text.replace(/[^\u4e00-\u9fff]/g, '').split(''))];
        result.innerHTML = `
          <h3>辨識結果（${chars.length} 個字）</h3>
          <div style="margin:8px 0;display:flex;flex-wrap:wrap;gap:4px;">
            ${chars.map(c => `<span class="chip" data-char="${c}">${c} <button class="chip-remove" data-action="removeOcrChar" data-char="${c}">✕</button></span>`).join('')}
          </div>
          <p style="font-size:14px;color:var(--text-light);margin:8px 0;">原始文字：${text.substring(0, 200)}</p>
          <button class="btn btn-primary btn-block mt-12" onclick="addOcrChars()">全部加入詞庫</button>
        `;
      }
    } catch (err) {
      loadingDiv.remove();
      if (result) result.innerHTML = `<p style="color:var(--danger);">辨識失敗：${err.message}</p>`;
    }
  });
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

window.addOcrChars = function() {
  const chips = document.querySelectorAll('#ocrResult .chip');
  const lessons = getLessons();
  const lesson = lessons.find(l => l.id === viewParams.lessonId);
  if (!lesson) return;

  let count = 0;
  chips.forEach(chip => {
    const ch = chip.dataset.char;
    if (ch && !lesson.words.find(w => w.text === ch)) {
      lesson.words.push({ id: Date.now().toString() + count, text: ch, zhuyin: autoGenerateZhuyin(ch), radical: autoGenerateRadical(ch) });
      count++;
    }
  });
  saveLessons(lessons);
  alert(`已加入 ${count} 個字到詞庫`);
  goBack();
};

// ========== INIT ==========
function init() {
  render();
  initOCR();
}

document.addEventListener('DOMContentLoaded', init);
</script>
