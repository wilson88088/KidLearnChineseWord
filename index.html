<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>еңӢе°ҸеңӢж–Үз·ҙзҝ’зі»зөұ</title>
<style>
:root {
  --primary: #4A90D9;
  --primary-dark: #3570B0;
  --accent: #FF8C42;
  --success: #4CAF50;
  --danger: #E74C3C;
  --warning: #F39C12;
  --bg: #F0F4F8;
  --card: #FFFFFF;
  --text: #2C3E50;
  --text-light: #7F8C8D;
  --border: #E0E6ED;
  --shadow: 0 2px 8px rgba(0,0,0,0.1);
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: "Microsoft JhengHei","PingFang TC","Noto Sans TC",sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 18px;
  line-height: 1.6;
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
}
#app { max-width: 600px; margin: 0 auto; padding: 0 0 80px 0; }

/* Header */
.header {
  background: linear-gradient(135deg, var(--primary), #6BB5FF);
  color: #fff;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 10px rgba(74,144,217,0.3);
}
.header .back-btn {
  background: rgba(255,255,255,0.2);
  border: none;
  color: #fff;
  font-size: 22px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.header .back-btn:active { background: rgba(255,255,255,0.35); }
.header h1 { font-size: 20px; font-weight: 700; }
.header .header-actions { margin-left: auto; display: flex; gap: 8px; }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 24px;
  border: none;
  border-radius: var(--radius);
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
  white-space: nowrap;
}
.btn:active { transform: scale(0.96); }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:active { background: var(--primary-dark); }
.btn-accent { background: var(--accent); color: #fff; }
.btn-accent:active { background: #E07530; }
.btn-success { background: var(--success); color: #fff; }
.btn-success:active { background: #3D9140; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:active { background: #C0392B; }
.btn-outline {
  background: transparent;
  border: 2px solid var(--primary);
  color: var(--primary);
}
.btn-lg { padding: 16px 32px; font-size: 20px; border-radius: 16px; }
.btn-sm { padding: 8px 16px; font-size: 15px; }
.btn-block { width: 100%; }
.btn-icon {
  width: 48px; height: 48px; padding: 0;
  border-radius: 50%; font-size: 22px;
}
.btn-icon-sm { width: 40px; height: 40px; font-size: 18px; }

/* Cards */
.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px;
  margin: 12px 16px;
}
.card-clickable { cursor: pointer; transition: transform 0.1s; }
.card-clickable:active { transform: scale(0.98); }

/* Lists */
.list-item {
  display: flex;
  align-items: center;
  padding: 16px 20px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  gap: 12px;
  transition: background 0.1s;
}
.list-item:first-child { border-radius: var(--radius) var(--radius) 0 0; }
.list-item:last-child { border-radius: 0 0 var(--radius) var(--radius); border-bottom: none; }
.list-item:only-child { border-radius: var(--radius); }
.list-item:active { background: #EBF2FA; }
.list-item .item-text { flex: 1; }
.list-item .item-text h3 { font-size: 19px; font-weight: 600; }
.list-item .item-text p { font-size: 14px; color: var(--text-light); }
.list-item .arrow { color: var(--text-light); font-size: 20px; }
.list-container { margin: 12px 16px; box-shadow: var(--shadow); border-radius: var(--radius); overflow: hidden; }

/* Form */
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 16px; }
.form-input {
  width: 100%;
  padding: 14px 16px;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  font-size: 18px;
  font-family: inherit;
  transition: border-color 0.2s;
}
.form-input:focus { border-color: var(--primary); outline: none; }

/* Tags / Chips */
.chip {
  display: inline-flex;
  align-items: center;
  padding: 6px 14px;
  background: #EBF2FA;
  border-radius: 20px;
  font-size: 15px;
  gap: 6px;
  margin: 4px;
}
.chip-remove {
  background: none; border: none;
  color: var(--danger); font-size: 16px;
  cursor: pointer; padding: 0 2px;
}

/* Handwriting Canvas */
.canvas-area {
  border: 3px dashed var(--border);
  border-radius: var(--radius);
  background: #FEFEFE;
  touch-action: none;
  position: relative;
}
.canvas-area canvas { display: block; width: 100%; height: 100%; }

/* Score display */
.score-display {
  text-align: center;
  padding: 40px 20px;
}
.score-number {
  font-size: 72px;
  font-weight: 800;
  margin: 16px 0;
}
.score-great { color: var(--success); }
.score-ok { color: var(--warning); }
.score-low { color: var(--danger); }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; padding: 20px;
}
.modal {
  background: var(--card);
  border-radius: 20px;
  padding: 28px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}
.modal h2 { margin-bottom: 16px; font-size: 22px; }
.modal .btn { margin-top: 12px; }

/* Badge */
.badge {
  background: var(--accent);
  color: #fff;
  border-radius: 12px;
  padding: 2px 10px;
  font-size: 14px;
  font-weight: 700;
}

/* Home menu grid */
.home-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 16px;
}
.home-card {
  background: var(--card);
  border-radius: 16px;
  padding: 24px 16px;
  text-align: center;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.1s;
}
.home-card:active { transform: scale(0.96); }
.home-card .icon { font-size: 40px; margin-bottom: 8px; }
.home-card .label { font-size: 17px; font-weight: 600; }
.home-card.wide { grid-column: span 2; }

/* Review card */
.review-card {
  text-align: center;
  padding: 24px;
}
.review-char {
  font-size: 120px;
  font-weight: 700;
  line-height: 1.2;
  margin: 12px 0;
  color: var(--text);
}
.review-zhuyin {
  font-size: 36px;
  color: var(--primary);
  margin-bottom: 12px;
}
.review-stroke-container {
  display: flex;
  justify-content: center;
  margin: 16px 0;
}

/* Test layout */
.test-container {
  padding: 16px;
}
.test-prompt {
  text-align: center;
  margin-bottom: 16px;
}
.test-zhuyin {
  font-size: 48px;
  color: var(--primary);
  font-weight: 700;
}
.test-progress {
  font-size: 15px;
  color: var(--text-light);
  margin-bottom: 8px;
}
.test-canvas-wrapper {
  width: calc(100% - 16px);
  max-width: 100%;
  aspect-ratio: 4 / 3;
  margin: 0 auto 16px;
}
.test-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}
.test-answer {
  font-size: 64px;
  font-weight: 700;
  color: var(--success);
  text-align: center;
  margin: 8px 0;
  min-height: 80px;
}

/* Eval card */
.eval-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px;
  background: var(--card);
  border-radius: var(--radius);
  margin: 8px 16px;
  box-shadow: var(--shadow);
}
.eval-item img {
  width: 100px;
  height: 100px;
  border: 2px solid var(--border);
  border-radius: 8px;
  object-fit: contain;
  background: #fff;
}
.eval-info {
  flex: 1;
  text-align: center;
}
.eval-info .char { font-size: 32px; font-weight: 700; }
.eval-info .zhuyin { font-size: 20px; color: var(--primary); }
.eval-btns { display: flex; flex-direction: column; gap: 8px; }
.eval-marked { font-size: 28px; font-weight: 700; }
.eval-correct { color: var(--success); }
.eval-wrong { color: var(--danger); }

/* Checkbox list */
.check-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}
.check-item:last-child { border-bottom: none; }
.check-box {
  width: 28px; height: 28px;
  border: 2px solid var(--border);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: #fff;
  flex-shrink: 0;
  transition: all 0.15s;
}
.check-item.checked .check-box {
  background: var(--primary);
  border-color: var(--primary);
}
.check-item .check-label { font-size: 18px; flex: 1; }

/* Points bar */
.points-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px;
  font-size: 20px;
  font-weight: 700;
  color: var(--accent);
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-light);
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 16px; }

/* Floating action button */
.fab {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: var(--primary);
  color: #fff;
  border: none;
  font-size: 30px;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(74,144,217,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 50;
}
.fab:active { transform: scale(0.92); }

/* Tab bar for word detail */
.tab-bar {
  display: flex;
  border-bottom: 2px solid var(--border);
  margin: 0 16px;
}
.tab {
  flex: 1;
  padding: 12px;
  text-align: center;
  font-size: 16px;
  font-weight: 600;
  color: var(--text-light);
  background: none;
  border: none;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  font-family: inherit;
}
.tab.active {
  color: var(--primary);
  border-bottom-color: var(--primary);
}

/* Record bar chart */
.record-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 4px 0;
}
.record-bar .bar {
  height: 20px;
  border-radius: 10px;
  min-width: 4px;
}
.bar-correct { background: var(--success); }
.bar-wrong { background: var(--danger); }

/* OCR loading */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.9);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 300;
  gap: 16px;
}
.spinner {
  width: 48px; height: 48px;
  border: 4px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Reward item */
.reward-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 20px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
}
.reward-item:last-child { border-bottom: none; }
.reward-info { flex: 1; }
.reward-info h3 { font-size: 18px; }
.reward-info .cost { color: var(--accent); font-weight: 600; font-size: 15px; }

/* Utility */
.text-center { text-align: center; }
.mt-12 { margin-top: 12px; }
.mt-16 { margin-top: 16px; }
.mb-12 { margin-bottom: 12px; }
.p-16 { padding: 16px; }
.gap-12 { gap: 12px; }
.flex { display: flex; }
.flex-center { display: flex; align-items: center; justify-content: center; }
.flex-col { display: flex; flex-direction: column; }
.flex-wrap { flex-wrap: wrap; }
.hidden { display: none !important; }

/* Animations */
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
.fade-in { animation: fadeIn 0.3s ease-out; }
@keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 70% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
.pop-in { animation: pop 0.4s ease-out; }

/* Image viewer */
.img-viewer {
  width: 100%;
  max-height: 70vh;
  object-fit: contain;
  border-radius: var(--radius);
}

/* Delete word btn */
.word-delete {
  background: none;
  border: none;
  color: var(--danger);
  font-size: 20px;
  cursor: pointer;
  padding: 4px 8px;
  opacity: 0.6;
}
.word-delete:active { opacity: 1; }

/* Responsive */
@media (max-width: 400px) {
  .review-char { font-size: 80px; }
  .test-zhuyin { font-size: 36px; }
  .btn-lg { padding: 14px 24px; font-size: 18px; }
}
</style>

    'yan':'г„§г„ў','yin':'г„§г„Ј','yang':'г„§г„Ө','ying':'г„§г„Ҙ','yong':'г„©г„Ҙ',
    'yu':'г„©','yue':'г„©г„қ','yuan':'г„©г„ў','yun':'г„©г„Ј',
    'wu':'г„Ё','wa':'г„Ёг„ҡ','wo':'г„Ёг„ӣ','wai':'г„Ёг„һ','wei':'г„Ёг„ҹ',
    'wan':'г„Ёг„ў','wen':'г„Ёг„Ј','wang':'г„Ёг„Ө','weng':'г„Ёг„Ҙ',
    'a':'г„ҡ','o':'г„ӣ','e':'г„ң','ai':'г„һ','ei':'г„ҹ',
    'ao':'г„ ','ou':'г„Ў','an':'г„ў','en':'г„Ј','ang':'г„Ө','eng':'г„Ҙ','er':'г„Ұ',
  };
  if (wholeMap[base]) return wholeMap[base] + toneSymbols[tone];

  // Parse initial + final
  const initials = ['zh','ch','sh','b','p','m','f','d','t','n','l','g','k','h','j','q','x','r','z','c','s'];
  const initialZhuyin = {
    'b':'г„…','p':'г„Ҷ','m':'г„Ү','f':'г„Ҳ','d':'г„ү','t':'г„Ҡ','n':'г„Ӣ','l':'г„Ң',
    'g':'г„Қ','k':'г„Һ','h':'г„Ҹ','j':'г„җ','q':'г„‘','x':'г„’',
    'zh':'г„“','ch':'г„”','sh':'г„•','r':'г„–','z':'г„—','c':'г„ҳ','s':'г„ҷ',
  };
  let ini = '', fin = base;
  for (const i of initials) {
    if (base.startsWith(i)) { ini = i; fin = base.slice(i.length); break; }
  }
  // j/q/x + u вҶ’ Гј in zhuyin
  if (['j','q','x'].includes(ini) && fin.startsWith('u')) {
    fin = 'Гј' + fin.slice(1);
  }
  const finalZhuyin = {
    'a':'г„ҡ','o':'г„ӣ','e':'г„ң','i':'г„§','u':'г„Ё','Гј':'г„©',
    'ai':'г„һ','ei':'г„ҹ','ao':'г„ ','ou':'г„Ў',
    'an':'г„ў','en':'г„Ј','ang':'г„Ө','eng':'г„Ҙ','ong':'г„Ёг„Ҙ','er':'г„Ұ',
    'ia':'г„§г„ҡ','ie':'г„§г„қ','iao':'г„§г„ ','iu':'г„§г„Ў','iou':'г„§г„Ў',
    'ian':'г„§г„ў','in':'г„§г„Ј','iang':'г„§г„Ө','ing':'г„§г„Ҙ','iong':'г„©г„Ҙ',
    'ua':'г„Ёг„ҡ','uo':'г„Ёг„ӣ','uai':'г„Ёг„һ','ui':'г„Ёг„ҹ','uei':'г„Ёг„ҹ',
    'uan':'г„Ёг„ў','un':'г„Ёг„Ј','uen':'г„Ёг„Ј','uang':'г„Ёг„Ө',
    'Гјe':'г„©г„қ','Гјan':'г„©г„ў','Гјn':'г„©г„Ј',
  };
  return (initialZhuyin[ini] || '') + (finalZhuyin[fin] || fin) + toneSymbols[tone];
}

function autoGenerateZhuyin(text) {
  if (!text) return '';
  try {
    const chars = text.split('');
    const zhuyinParts = chars.map(ch => {
      if (!/[\u4e00-\u9fff]/.test(ch)) return ch; // non-Chinese char
      // Layer 1: embedded ZHUYIN_DICT (offline, reliable, 1633 chars)
      if (ZHUYIN_DICT && ZHUYIN_DICT[ch]) return ZHUYIN_DICT[ch];
      // Layer 2: pinyin-pro CDN (online, comprehensive)
      if (window.pinyinPro) {
        try {
          const py = window.pinyinPro.pinyin(ch, { toneType: 'symbol', type: 'array' });
          if (py && py.length > 0) return syllableToZhuyin(py[0]);
        } catch {}
      }
      return ch;
    });
    return zhuyinParts.join(' ').trim();
  } catch { return ''; }
}


function autoGenerateRadical(text) {
  if (!text) return '';
  try {
    const chars = text.split('').filter(ch => /[дёҖ-йҝҝ]/.test(ch));
    const radicals = chars.map(ch => RADICAL_DICT[ch] || '').filter(r => r);
    return [...new Set(radicals)].join('гҖҒ');
  } catch { return ''; }
}

// ========== NAV STATE ==========
let currentView = 'home';
let viewParams = {};
const history_stack = [];

function navigate(view, params = {}) {
  history_stack.push({ view: currentView, params: { ...viewParams } });
  currentView = view;
  viewParams = params;
  render();
  window.scrollTo(0, 0);
}

function goBack() {
  if (history_stack.length > 0) {
    const prev = history_stack.pop();
    currentView = prev.view;
    viewParams = prev.params;
    render();
  } else {
    currentView = 'home';
    viewParams = {};
    render();
  }
}

// ========== RENDER ENGINE ==========
function render() {
  const app = document.getElementById('app');
  switch (currentView) {
    case 'home': app.innerHTML = renderHome(); break;
    case 'lessonDetail': app.innerHTML = renderLessonDetail(); break;
    case 'addWord': app.innerHTML = renderAddWord(); break;
    case 'editLesson': app.innerHTML = renderEditLesson(); break;
    case 'ocrImport': app.innerHTML = renderOcrImport(); break;
    case 'originalText': app.innerHTML = renderOriginalText(); break;
    case 'reviewSetup': app.innerHTML = renderReviewSetup(); break;
    case 'review': app.innerHTML = renderReview(); autoPlayReview(); break;
    case 'testSetup': app.innerHTML = renderTestSetup(); break;
    case 'test': renderTest(app); return;
    case 'evaluate': app.innerHTML = renderEvaluate(); break;
    case 'result': app.innerHTML = renderResult(); break;
    case 'records': app.innerHTML = renderRecords(); break;
    case 'recordDetail': app.innerHTML = renderRecordDetail(); break;
    case 'rewards': app.innerHTML = renderRewards(); break;
    case 'addReward': app.innerHTML = renderAddReward(); break;
    case 'settings': app.innerHTML = renderSettings(); break;
    default: app.innerHTML = renderHome();
  }
  bindEvents();
}

function bindEvents() {
  // Bind delegated events after render
  document.querySelectorAll('[data-action]').forEach(el => {
    const action = el.dataset.action;
    const handler = handlers[action];
    if (handler) {
      el.onclick = (e) => handler(e, el);
    }
  });
  // Auto-generate zhuyin when typing characters (supports multi-line)
  const wordInput = document.getElementById('wordText');
  if (wordInput) {
    wordInput.addEventListener('input', () => {
      const raw = wordInput.value;
      if (!raw.trim()) return;
      const lines = raw.split('\n');
      const zhuyinLines = lines.map(line => {
        const t = line.trim();
        return t ? autoGenerateZhuyin(t) : '';
      });
      document.getElementById('wordZhuyin').value = zhuyinLines.join('\n');
    });
  }
}

// Auto-play pronunciation + stroke order when entering review mode
function autoPlayReview() {
  const words = viewParams.reviewWords || [];
  const idx = viewParams.reviewIndex || 0;
  if (words.length === 0) return;
  const word = words[idx];
  // Small delay to ensure DOM is ready
  setTimeout(() => {
    // Auto-play pronunciation
    speak(word.text);
    // Auto-play stroke order animation
    const target = document.getElementById('strokeTarget');
    if (!target) return;
    target.innerHTML = '';
    const chars = word.text.split('');
    const divs = chars.map(ch => {
      const div = document.createElement('div');
      div.style.display = 'inline-block';
      div.style.margin = '4px';
      target.appendChild(div);
      return { div, ch };
    });
    async function animateSequentially() {
      for (const { div, ch } of divs) {
        if (!/[\u4e00-\u9fff]/.test(ch)) {
          div.innerHTML = `<span style="font-size:60px">${ch}</span>`;
          continue;
        }
        try {
          const writer = HanziWriter.create(div, ch, {
            width: 120, height: 120,
            padding: 5,
            showOutline: true,
            strokeAnimationSpeed: 1,
            delayBetweenStrokes: 300,
          });
          await new Promise(resolve => {
            writer.animateCharacter({ onComplete: resolve });
          });
        } catch (err) {
          div.innerHTML = `<span style="font-size:60px">${ch}</span>`;
        }
      }
    }
    animateSequentially();
  }, 300);
}

// ========== CANVAS ==========
let canvasDrawing = false;
let canvasCtx = null;
let lastPos = null;

function initCanvas() {
  const canvas = document.getElementById('testCanvas');
  if (!canvas) return;
  const wrapper = canvas.parentElement;
  const size = wrapper.clientWidth;
  canvas.width = size;
  canvas.height = size;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
  canvasCtx = canvas.getContext('2d');
  canvasCtx.lineCap = 'round';
  canvasCtx.lineJoin = 'round';
  canvasCtx.lineWidth = 5;
  canvasCtx.strokeStyle = '#2C3E50';

  // Draw guide lines
  drawGuideLines(canvasCtx, size);

  canvas.addEventListener('mousedown', onCanvasStart);
  canvas.addEventListener('mousemove', onCanvasMove);
  canvas.addEventListener('mouseup', onCanvasEnd);
  canvas.addEventListener('mouseleave', onCanvasEnd);
  canvas.addEventListener('touchstart', onCanvasTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onCanvasTouchMove, { passive: false });
  canvas.addEventListener('touchend', onCanvasEnd);
}

function drawGuideLines(ctx, size) {
  ctx.save();
  ctx.strokeStyle = '#E0E6ED';
  ctx.lineWidth = 1;
  ctx.setLineDash([8, 4]);
  ctx.beginPath();
  ctx.moveTo(size / 2, 0); ctx.lineTo(size / 2, size);
  ctx.moveTo(0, size / 2); ctx.lineTo(size, size / 2);
  ctx.stroke();
  ctx.restore();
  ctx.lineWidth = 5;
  ctx.strokeStyle = '#2C3E50';
}

function getCanvasPos(e, canvas) {
  const rect = canvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function onCanvasStart(e) {
  canvasDrawing = true;
  lastPos = getCanvasPos(e, e.target);
}
function onCanvasMove(e) {
  if (!canvasDrawing || !canvasCtx) return;
  const pos = getCanvasPos(e, e.target);
  canvasCtx.beginPath();
  canvasCtx.moveTo(lastPos.x, lastPos.y);
  canvasCtx.lineTo(pos.x, pos.y);
  canvasCtx.stroke();
  lastPos = pos;
}
function onCanvasEnd() { canvasDrawing = false; lastPos = null; }
function onCanvasTouchStart(e) {
  e.preventDefault();
  const touch = e.touches[0];
  canvasDrawing = true;
  lastPos = getCanvasPos(touch, e.target);
}
function onCanvasTouchMove(e) {
  e.preventDefault();
  if (!canvasDrawing || !canvasCtx) return;
  const touch = e.touches[0];
  const pos = getCanvasPos(touch, e.target);
  canvasCtx.beginPath();
  canvasCtx.moveTo(lastPos.x, lastPos.y);
  canvasCtx.lineTo(pos.x, pos.y);
  canvasCtx.stroke();
  lastPos = pos;
}

function getCanvasImage() {
  const canvas = document.getElementById('testCanvas');
  return canvas ? canvas.toDataURL('image/png') : '';
}

function clearCanvasArea() {
  const canvas = document.getElementById('testCanvas');
  if (!canvas || !canvasCtx) return;
  canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
  drawGuideLines(canvasCtx, canvas.width);
}

    const rawZhuyin = document.getElementById('wordZhuyin').value.trim();

    const lessons = getLessons();
    const lesson = lessons.find(l => l.id === viewParams.lessonId);
    if (lesson) {
      const textLines = rawText.split('\n').map(l => l.trim()).filter(l => l);
      const zhuyinLines = rawZhuyin.split('\n').map(l => l.trim());
      textLines.forEach((t, i) => {
        lesson.words.push({ id: (Date.now() + i).toString(), text: t, zhuyin: zhuyinLines[i] || autoGenerateZhuyin(t), radical: autoGenerateRadical(t) });
      });
      saveLessons(lessons);
    }
    goBack();
  },
  saveAndContinue: () => {
    const rawText = document.getElementById('wordText').value.trim();
    const rawZhuyin = document.getElementById('wordZhuyin').value.trim();
    if (!rawText) { alert('и«Ӣијёе…Ҙеӯ—жҲ–и©һ'); return; }
    const lessons = getLessons();
    const lesson = lessons.find(l => l.id === viewParams.lessonId);
    if (lesson) {
      const textLines = rawText.split('\n').map(l => l.trim()).filter(l => l);
      const zhuyinLines = rawZhuyin.split('\n').map(l => l.trim());
      textLines.forEach((t, i) => {
        lesson.words.push({ id: (Date.now() + i).toString(), text: t, zhuyin: zhuyinLines[i] || autoGenerateZhuyin(t), radical: autoGenerateRadical(t) });
      });

  },

    if (!confirm('зўәе®ҡиҰҒеҲӘйҷӨе—Һпјҹ')) return;

    if (lesson) {
      lesson.words = lesson.words.filter(w => w.id !== el.dataset.id);
      saveLessons(lessons);
    }
    render();
  },
  previewWord: (e, el) => {
    speak(el.dataset.text);
  },

  // Original text
  uploadOriginalText: () => {
    const input = document.getElementById('originalTextInput');
    if (input) {
      input.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          const lessons = getLessons();
          const lesson = lessons.find(l => l.id === viewParams.lessonId);
          if (lesson) {
            lesson.originalImage = ev.target.result;
            saveLessons(lessons);
            render();
          }
        };
        reader.readAsDataURL(file);
      };
      input.click();
    }
  },
  viewOriginalText: () => {
    navigate('originalText', { lessonId: viewParams.lessonId });
  },

  // OCR
  goOcr: () => navigate('ocrImport', { lessonId: viewParams.lessonId }),

  // Review
  goReviewSetup: () => navigate('reviewSetup', { selectedLessons: [], reviewFilter: 'all' }),
  toggleLessonCheck: (e, el) => {
    const id = el.dataset.id;
    let sel = viewParams.selectedLessons || [];
    if (sel.includes(id)) { sel = sel.filter(x => x !== id); }
    else { sel.push(id); }
    viewParams.selectedLessons = sel;
    render();
  },
  setReviewFilter: (e, el) => {
    viewParams.reviewFilter = el.dataset.filter;
    render();
  },
  startReview: () => {
    const sel = viewParams.selectedLessons || [];
    if (sel.length === 0) { alert('и«ӢйҒёж“ҮиҮіе°‘дёҖеҖӢиӘІзЁӢ'); return; }
    const lessons = getLessons();
    let words = [];
    sel.forEach(id => {
      const l = lessons.find(x => x.id === id);
      if (l) words.push(...l.words);
    });
    if (viewParams.reviewFilter === 'wrong') {
      const records = getRecords();
      words = words.filter(w => records[w.text] && (records[w.text].wrong || 0) > 0);
    }
    if (words.length === 0) { alert('жІ’жңүз¬ҰеҗҲжўқд»¶зҡ„еӯ—и©һ'); return; }
    // Shuffle
    for (let i = words.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [words[i], words[j]] = [words[j], words[i]];
    }
    navigate('review', { reviewWords: words, reviewIndex: 0 });
  },
  reviewPrev: () => {
    if ((viewParams.reviewIndex || 0) > 0) {
      viewParams.reviewIndex--;
      render();
    }
  },
  reviewNext: () => {
    const words = viewParams.reviewWords || [];
    const idx = viewParams.reviewIndex || 0;
    if (idx < words.length - 1) {
      viewParams.reviewIndex++;
      render();
    } else {
      goBack();
    }
  },
  speakWord: (e, el) => { speak(el.dataset.text); },
  showStroke: (e, el) => {
    const target = document.getElementById('strokeTarget');
    if (!target) return;
    target.innerHTML = '';
    const chars = el.dataset.text.split('');
    // Create all containers first
    const divs = chars.map(ch => {
      const div = document.createElement('div');
      div.style.display = 'inline-block';
      div.style.margin = '4px';
      target.appendChild(div);
      return { div, ch };
    });
    // Animate sequentially: wait for each character to finish before starting next
    async function animateSequentially() {
      for (const { div, ch } of divs) {
        try {
          const writer = HanziWriter.create(div, ch, {
            width: 120, height: 120,
            padding: 5,
            showOutline: true,
            strokeAnimationSpeed: 1,
            delayBetweenStrokes: 300,
          });
          await new Promise(resolve => {
            writer.animateCharacter({ onComplete: resolve });
          });
        } catch (err) {
          div.innerHTML = `<span style="font-size:60px">${ch}</span>`;
        }
      }
    }
    animateSequentially();
  },

  // Test
  goTestSetup: () => navigate('testSetup', { selectedLessons: [] }),
  toggleTestLessonCheck: (e, el) => {
    const id = el.dataset.id;
    let sel = viewParams.selectedLessons || [];
    if (sel.includes(id)) { sel = sel.filter(x => x !== id); }
    else { sel.push(id); }
    viewParams.selectedLessons = sel;
    render();
  },
  startTest: () => {
    const sel = viewParams.selectedLessons || [];
    if (sel.length === 0) { alert('и«ӢйҒёж“ҮиҮіе°‘дёҖеҖӢиӘІзЁӢ'); return; }
    const lessons = getLessons();
    let words = [];
    sel.forEach(id => {
      const l = lessons.find(x => x.id === id);
      if (l) words.push(...l.words);
    });
    if (words.length === 0) { alert('жүҖйҒёиӘІзЁӢжІ’жңүеӯ—и©һ'); return; }
    for (let i = words.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [words[i], words[j]] = [words[j], words[i]];
    }
    navigate('test', {
      testWords: words,
      testIndex: 0,
      canvasImages: [],
      showAnswer: false,
      selectedLessons: sel,
    });
  },
  toggleAnswer: () => {
    viewParams.showAnswer = !viewParams.showAnswer;
    render();
  },
  clearCanvas: () => { clearCanvasArea(); },
  testNext: () => {
    const words = viewParams.testWords || [];
    const idx = viewParams.testIndex || 0;
    // Save canvas image
    if (!viewParams.canvasImages) viewParams.canvasImages = [];
    viewParams.canvasImages[idx] = getCanvasImage();
    viewParams.showAnswer = false;

    if (idx < words.length - 1) {
      viewParams.testIndex++;
      render();
    } else {
      // Last question - speak and go to evaluate
      speak('иҫӣиӢҰдәҶпјҢдҪ еҫҲжЈ’пјҢе®ҢжҲҗйҖҷдёҖиӘІпјҢи«ӢзҲёзҲёеӘҪеӘҪдҫҶи©•еҲҶ', () => {
        navigate('evaluate', {
          testWords: words,
          canvasImages: viewParams.canvasImages,
          grades: {},
          selectedLessons: viewParams.selectedLessons,
        });
      });
      // Also navigate after a timeout in case TTS doesn't fire onend
      setTimeout(() => {
        if (currentView === 'test') {
          navigate('evaluate', {
            testWords: words,
            canvasImages: viewParams.canvasImages,
            grades: {},
            selectedLessons: viewParams.selectedLessons,
          });
        }
      }, 5000);
    }
  },

  // Evaluate
  gradeCorrect: (e, el) => {
    const idx = parseInt(el.dataset.idx);
    viewParams.grades[idx] = true;
    render();
  },
  gradeWrong: (e, el) => {
    const idx = parseInt(el.dataset.idx);
    viewParams.grades[idx] = false;
    render();
  },
  showResult: () => {
    const words = viewParams.testWords || [];
    const grades = viewParams.grades || {};
    let correct = 0;
    const records = getRecords();
    const now = new Date().toISOString();

    words.forEach((w, i) => {
      const isCorrect = grades[i] === true;
      if (isCorrect) correct++;
      // Update records
      if (!records[w.text]) records[w.text] = { correct: 0, wrong: 0, history: [] };
      if (isCorrect) records[w.text].correct++;
      else records[w.text].wrong++;
      records[w.text].history.push({ date: now, result: isCorrect ? 'correct' : 'wrong' });
    });
    saveRecords(records);

    const score = Math.round((correct / words.length) * 100);
    if (score === 100) {
      const pts = getPoints();
      savePoints(pts + 1);
    }

    // Feedback voice
    if (score >= 90) speak('дҪ еҘҪжЈ’пјҒ');
    else if (score >= 60) speak('и«ӢеҠ жІ№пјҒ');
    else speak('и«ӢеҶҚиҖғдёҖж¬Ў');

    navigate('result', {
      correctCount: correct,
      totalCount: words.length,
      selectedLessons: viewParams.selectedLessons,
    });
  },
  retakeTest: () => {
    const sel = viewParams.selectedLessons || [];
    // Go back to test setup with selections
    history_stack.length = 0;
    currentView = 'testSetup';
    viewParams = { selectedLessons: sel };
    render();
  },

  // Records
  goRecords: () => navigate('records'),
  openRecordDetail: (e, el) => {
    navigate('recordDetail', { wordText: el.dataset.text });
  },

  // Rewards
  goRewards: () => navigate('rewards'),
  goAddReward: () => navigate('addReward'),
  saveReward: () => {
    const name = document.getElementById('rewardName').value.trim();
    const cost = parseInt(document.getElementById('rewardCost').value) || 1;
    if (!name) { alert('и«Ӣијёе…ҘзҚҺеӢөеҗҚзЁұ'); return; }
    const rewards = getRewards();
    rewards.push({ id: Date.now().toString(), name, cost });
    saveRewards(rewards);
    goBack();
  },
  redeemReward: (e, el) => {
    const rewards = getRewards();
    const reward = rewards.find(r => r.id === el.dataset.id);
    if (!reward) return;
    const points = getPoints();
    if (points < reward.cost) { alert('й»һж•ёдёҚи¶і'); return; }
    if (!confirm(`зўәе®ҡиҰҒз”Ё ${reward.cost} й»һе…ҢжҸӣгҖҢ${reward.name}гҖҚе—Һпјҹ`)) return;
    savePoints(points - reward.cost);
    speak('жҒӯе–ңе…ҢжҸӣжҲҗеҠҹпјҒ');
    render();
  },
  deleteReward: (e, el) => {
    e.stopPropagation();
    if (!confirm('зўәе®ҡиҰҒеҲӘйҷӨжӯӨзҚҺеӢөе—Һпјҹ')) return;
    const rewards = getRewards().filter(r => r.id !== el.dataset.id);
    saveRewards(rewards);
    render();
  },

  // Settings
  goSettings: () => navigate('settings'),
  systemReset: () => {
    const pwd = prompt('и«Ӣијёе…Ҙз®ЎзҗҶеҜҶзўјпјҡ');
    const savedPwd = localStorage.getItem('zhcn_admin_pwd') || '1234';
    if (pwd !== savedPwd) { alert('еҜҶзўјйҢҜиӘӨ'); return; }
    if (!confirm('вҡ пёҸ зўәе®ҡиҰҒйҮҚзҪ®жүҖжңүиіҮж–ҷе—Һпјҹ\nжӯӨж“ҚдҪңз„Ўжі•еҫ©еҺҹпјҒ\nпјҲе»әиӯ°е…ҲеҢҜеҮәеӮҷд»Ҫпјү')) return;
    if (!confirm('еҶҚж¬ЎзўәиӘҚпјҡжүҖжңүиӘІзЁӢгҖҒеӯёзҝ’зҙҖйҢ„гҖҒй»һж•ёе°Үиў«жё…йҷӨпјҒ')) return;
    Object.values(KEYS).forEach(k => localStorage.removeItem(k));
    alert('жүҖжңүиіҮж–ҷе·ІйҮҚзҪ®');
    history_stack.length = 0;
    currentView = 'home';
    viewParams = {};
    render();
  },
  exportBackup: () => {
    const pwd = prompt('и«Ӣијёе…Ҙз®ЎзҗҶеҜҶзўјпјҡ');
    const savedPwd = localStorage.getItem('zhcn_admin_pwd') || '1234';
    if (pwd !== savedPwd) { alert('еҜҶзўјйҢҜиӘӨ'); return; }
    const backup = {
      version: 1,
      date: new Date().toISOString(),
      lessons: getLessons(),
      records: getRecords(),
      points: getPoints(),
      rewards: getRewards(),
    };
    const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `еңӢеӯ—з·ҙзҝ’еӮҷд»Ҫ_${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    alert('еӮҷд»Ҫе·ІдёӢијү');
  },
  // Shared: apply backup data (supports both full backup and lessons-only format)
  _applyBackup: (backup, sourceName) => {
    // Support two formats:
    // 1. Full backup: { lessons, records, points, rewards, date }
    // 2. Lessons-only: { lessons } or [ {id, name, words} ]
    let lessons, records, points, rewards, date;
    if (Array.isArray(backup)) {
      // Array of lessons directly
      lessons = backup;
      records = {};
      points = null;
      rewards = null;
      date = null;
    } else if (backup.lessons) {
      lessons = backup.lessons;
      records = backup.records || {};
      points = backup.points;
      rewards = backup.rewards;
      date = backup.date;
    } else {
      alert('жӘ”жЎҲж јејҸдёҚжӯЈзўәпјҢжүҫдёҚеҲ°иӘІзЁӢиіҮж–ҷ'); return false;
    }
    // Validate lessons structure
    if (!Array.isArray(lessons) || lessons.length === 0) {
      alert('жӘ”жЎҲдёӯжІ’жңүиӘІзЁӢиіҮж–ҷ'); return false;
    }
    const info = date ? `\nеӮҷд»Ҫж—Ҙжңҹпјҡ${date}` : '';
    const mode = confirm(`еҢҜе…Ҙж–№ејҸпјҡ\n\nжҢүгҖҢзўәе®ҡгҖҚвҶ’ еҗҲдҪөпјҲдҝқз•ҷзҸҫжңүиіҮж–ҷпјҢеҠ е…Ҙж–°иӘІзЁӢпјү\nжҢүгҖҢеҸ–ж¶ҲгҖҚвҶ’ иҰҶи“ӢпјҲжё…йҷӨзҸҫжңүиіҮж–ҷпјҢеғ…дҝқз•ҷеҢҜе…Ҙе…§е®№пјү\n\nдҫҶжәҗпјҡ${sourceName}${info}\nж–°иӘІзЁӢж•ёпјҡ${lessons.length}`)
      ? 'merge' : 'overwrite';
    if (mode === 'overwrite') {
      if (!confirm('вҡ пёҸ зўәе®ҡиҰҒиҰҶи“ӢжүҖжңүзҸҫжңүиіҮж–ҷе—ҺпјҹжӯӨж“ҚдҪңз„Ўжі•еҫ©еҺҹпјҒ')) return false;
      saveLessons(lessons);
      saveRecords(records);
      if (points != null) savePoints(points);
      if (rewards != null) saveRewards(rewards);
    } else {
      // Merge: append new lessons, keep existing records/points/rewards
      const existing = getLessons();
      const existingIds = new Set(existing.map(l => l.id));
      let addCount = 0;
      lessons.forEach(l => {
        if (existingIds.has(l.id)) {
          // Generate new id to avoid conflict
          l.id = Date.now().toString() + Math.random().toString(36).slice(2, 6);
        }
        existing.push(l);
        addCount++;
      });
      saveLessons(existing);
      // Merge records if present
      if (records && Object.keys(records).length > 0) {
        const existingRecords = getRecords();
        Object.keys(records).forEach(k => {
          if (!existingRecords[k]) existingRecords[k] = records[k];
        });
        saveRecords(existingRecords);
      }
    }
    alert(`еҢҜе…ҘжҲҗеҠҹпјҒпјҲ${mode === 'merge' ? 'еҗҲдҪөжЁЎејҸ' : 'иҰҶи“ӢжЁЎејҸ'}пјү`);
    history_stack.length = 0;
    currentView = 'home';
    viewParams = {};
    render();
    return true;
  },
  importBackup: () => {
    const input = document.getElementById('importFileInput');
    if (!input) return;
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const backup = JSON.parse(ev.target.result);
          handlers._applyBackup(backup, 'жң¬ж©ҹжӘ”жЎҲпјҡ' + file.name);
        } catch (err) {
          alert('еҢҜе…ҘеӨұж•—пјҡжӘ”жЎҲж јејҸйҢҜиӘӨ');
        }
      };
      reader.readAsText(file);
      input.value = '';
    };
    input.click();
  },
  importFromUrl: () => {
    const urlInput = document.getElementById('importUrlInput');
    const url = urlInput ? urlInput.value.trim() : '';
    if (!url) { alert('и«Ӣијёе…Ҙ JSON жӘ”жЎҲз¶ІеқҖ'); return; }
    if (!url.startsWith('http://') && !url.startsWith('https://')) {
      alert('и«Ӣијёе…Ҙжңүж•Ҳзҡ„з¶ІеқҖпјҲд»Ҙ http:// жҲ– https:// й–Ӣй ӯпјү'); return;
    }
    const btn = document.querySelector('[data-action="importFromUrl"]');
    if (btn) { btn.disabled = true; btn.textContent = 'ијүе…Ҙдёӯ...'; }
    fetch(url)
      .then(res => {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      })
      .then(data => {
        handlers._applyBackup(data, 'з¶ІеқҖпјҡ' + url.slice(0, 50) + (url.length > 50 ? '...' : ''));
      })
      .catch(err => {
        alert('еҢҜе…ҘеӨұж•—пјҡз„Ўжі•ијүе…Ҙз¶ІеқҖе…§е®№\n' + err.message);
      })
      .finally(() => {
        if (btn) { btn.disabled = false; btn.textContent = 'рҹ”— еҢҜе…Ҙ'; }
      });
  },
  importExample: () => {
    const exampleUrl = 'https://raw.githubusercontent.com/wilson88088/KidLearnChineseWord/refs/heads/main/%E4%B8%89%E5%B9%B4%E7%B4%9A_L1ToL3.json';
    const btn = document.querySelector('[data-action="importExample"]');
    if (btn) { btn.disabled = true; btn.textContent = 'рҹ“ҡ ијүе…ҘзҜ„дҫӢдёӯ...'; }
    fetch(exampleUrl)
      .then(res => {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      })
      .then(data => {
        handlers._applyBackup(data, 'зҜ„дҫӢпјҡдёүе№ҙзҙҡ L1~L3');
      })
      .catch(err => {
        alert('еҢҜе…ҘзҜ„дҫӢеӨұж•—пјҡ\n' + err.message + '\n\nи«ӢзўәиӘҚз¶Іи·ҜйҖЈз·ҡжӯЈеёёгҖӮ');
      })
      .finally(() => {
        if (btn) { btn.disabled = false; btn.textContent = 'рҹ“ҡ еҢҜе…ҘзҜ„дҫӢпјҲдёүе№ҙзҙҡ L1~L3пјү'; }
      });
  },
  changePassword: () => {
    const oldPwd = document.getElementById('oldPassword').value;
    const newPwd = document.getElementById('newPassword').value;
    const savedPwd = localStorage.getItem('zhcn_admin_pwd') || '1234';
    if (oldPwd !== savedPwd) { alert('зӣ®еүҚеҜҶзўјйҢҜиӘӨ'); return; }
    if (!newPwd || newPwd.length < 4) { alert('ж–°еҜҶзўјиҮіе°‘йңҖиҰҒ 4 еҖӢеӯ—е…ғ'); return; }
    localStorage.setItem('zhcn_admin_pwd', newPwd);
    alert('еҜҶзўје·Іжӣҙж–°пјҒ');
    document.getElementById('oldPassword').value = '';
    document.getElementById('newPassword').value = '';
  },
};

// ========== OCR ==========
function initOCR() {
  // Listen for file input on OCR page
  document.addEventListener('change', async (e) => {
    if (e.target.id !== 'ocrFileInput') return;
    const file = e.target.files[0];
    if (!file) return;

    const preview = document.getElementById('ocrPreview');
    const result = document.getElementById('ocrResult');
    if (preview) {
      const url = URL.createObjectURL(file);
      preview.innerHTML = `<img src="${url}" style="max-width:100%;border-radius:8px;" />`;
    }

    // Show loading
    const loadingDiv = document.createElement('div');
    loadingDiv.className = 'loading-overlay';
    loadingDiv.innerHTML = '<div class="spinner"></div><p style="font-size:18px;">жӯЈеңЁиҫЁиӯҳж–Үеӯ—...</p>';
    document.body.appendChild(loadingDiv);

    try {
      if (typeof Tesseract === 'undefined') {
        // Load Tesseract dynamically
        await loadScript('https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js');
      }
      const worker = await Tesseract.createWorker('chi_tra');
      const { data } = await worker.recognize(file);
      await worker.terminate();

      const text = data.text.trim();
      loadingDiv.remove();

      if (result) {
        if (!text) {
          result.innerHTML = '<p style="color:var(--danger);">жңӘеҒөжё¬еҲ°ж–Үеӯ—пјҢи«Ӣеҳ—и©Ұе…¶д»–ең–зүҮгҖӮ</p>';
          return;
        }
        // Extract characters (filter out non-Chinese)
        const chars = [...new Set(text.replace(/[^\u4e00-\u9fff]/g, '').split(''))];
        result.innerHTML = `
          <h3>иҫЁиӯҳзөҗжһңпјҲ${chars.length} еҖӢеӯ—пјү</h3>
          <div style="margin:8px 0;display:flex;flex-wrap:wrap;gap:4px;">
            ${chars.map(c => `<span class="chip" data-char="${c}">${c} <button class="chip-remove" data-action="removeOcrChar" data-char="${c}">вң•</button></span>`).join('')}
          </div>
          <p style="font-size:14px;color:var(--text-light);margin:8px 0;">еҺҹе§Ӣж–Үеӯ—пјҡ${text.substring(0, 200)}</p>
          <button class="btn btn-primary btn-block mt-12" onclick="addOcrChars()">е…ЁйғЁеҠ е…Ҙи©һеә«</button>
        `;
      }
    } catch (err) {
      loadingDiv.remove();
      if (result) result.innerHTML = `<p style="color:var(--danger);">иҫЁиӯҳеӨұж•—пјҡ${err.message}</p>`;
    }
  });
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

window.addOcrChars = function() {
  const chips = document.querySelectorAll('#ocrResult .chip');
  const lessons = getLessons();
  const lesson = lessons.find(l => l.id === viewParams.lessonId);
  if (!lesson) return;

  let count = 0;
  chips.forEach(chip => {
    const ch = chip.dataset.char;
    if (ch && !lesson.words.find(w => w.text === ch)) {
      lesson.words.push({ id: Date.now().toString() + count, text: ch, zhuyin: autoGenerateZhuyin(ch), radical: autoGenerateRadical(ch) });
      count++;
    }
  });
  saveLessons(lessons);
  alert(`е·ІеҠ е…Ҙ ${count} еҖӢеӯ—еҲ°и©һеә«`);
  goBack();
};

// ========== INIT ==========
function init() {
  render();
  initOCR();
}

document.addEventListener('DOMContentLoaded', init);
